<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>E-İçerik Tablosu</title>
<style>
body { font-family: Arial; padding:20px; }
select, button { padding:6px; margin:4px; }
table { border-collapse: collapse; width:100%; margin-top:20px; }
th, td { border:1px solid #ccc; padding:6px; font-size:13px; }
th { background:#f2f2f2; }
.ai-btn { background:#0070f3; color:white; border:none; cursor:pointer; }
.ai-btn:hover { background:#0051aa; }
.modal {
 position:fixed; inset:0; background:rgba(0,0,0,.5);
 display:none; align-items:center; justify-content:center;
}
.modal-content {
 background:white; width:90%; max-width:800px;
 padding:20px; max-height:80vh; overflow:auto;
}
</style>
</head>
<body>

<h2>E-İçerik Tablosu</h2>

<label>Sınıf:</label>
<select id="grade"></select>

<label>Ders:</label>
<select id="course"></select>

<table id="table">
<thead>
<tr>
<th>SIRA</th>
<th>ÜNİTE</th>
<th>KAZANIM</th>
<th>İÇERİK</th>
<th>AÇIKLAMA</th>
<th>AI</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="modalTitle"></h3>
<pre id="modalText" style="white-space:pre-wrap"></pre>
<button onclick="closeModal()">Kapat</button>
</div>
</div>

<script>
let data = [];

fetch("content.csv")
  .then(r => r.text())
  .then(text => {
    data = parseCSV(text, ";");
    // Boş/bozuk satırları ayıkla
    data = data.filter(d => d["SINIF"] && String(d["SINIF"]).trim().match(/^\d+$/));
    initFilters();
  });

function parseCSV(text, delimiter) {
  // Basit ama doğru çalışan CSV parser (tırnak içindeki ; ve satır sonlarını bozmadan okur)
  const rows = [];
  let row = [];
  let cur = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const next = text[i + 1];

    if (c === '"') {
      if (inQuotes && next === '"') { // "" -> "
        cur += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (!inQuotes && c === delimiter) {
      row.push(cur);
      cur = "";
      continue;
    }

    if (!inQuotes && (c === "\n" || c === "\r")) {
      // Windows \r\n kontrolü
      if (c === "\r" && next === "\n") i++;
      row.push(cur);
      rows.push(row);
      row = [];
      cur = "";
      continue;
    }

    cur += c;
  }

  // son hücre
  if (cur.length > 0 || row.length > 0) {
    row.push(cur);
    rows.push(row);
  }

  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(cols => {
    const obj = {};
    headers.forEach((h, idx) => (obj[h] = (cols[idx] ?? "").trim()));
    return obj;
  });
}

function initFilters(){
 const gradeSelect = document.getElementById("grade");
 const courseSelect = document.getElementById("course");

 let grades = [...new Set(data.map(d => d["SINIF"]))]
  .filter(Boolean)
  .sort((a, b) => Number(a) - Number(b));
 gradeSelect.innerHTML = "<option value=''>Seçiniz</option>";
 grades.forEach(g=>{
   gradeSelect.innerHTML += `<option value="${g}">${g}</option>`;
 });

 gradeSelect.onchange = ()=>{
   let selected = gradeSelect.value;
   let courses = [...new Set(
     data.filter(d=>d["SINIF"]==selected)
         .map(d=>d["DERS ADI"])
   )];
   courseSelect.innerHTML = "<option value=''>Seçiniz</option>";
   courses.forEach(c=>{
     courseSelect.innerHTML += `<option value="${c}">${c}</option>`;
   });
 };

 courseSelect.onchange = renderTable;
}

function renderTable(){
 const grade = document.getElementById("grade").value;
 const course = document.getElementById("course").value;
 const tbody = document.querySelector("#table tbody");
 tbody.innerHTML = "";

 data.filter(d=>d["SINIF"]==grade && d["DERS ADI"]==course)
 .forEach(d=>{
   tbody.innerHTML += `
   <tr>
   <td>${d["SIRA NO"]}</td>
   <td>${d["ÜNİTE/TEMA/ ÖĞRENME ALANI"]}</td>
   <td>${d["KAZANIM/ÖĞRENME ÇIKTISI/BÖLÜM"]}</td>
   <td>${d["E-İÇERİK TÜRÜ"]}</td>
   <td>${d["AÇIKLAMA"]}</td>
   <td><button class="ai-btn" onclick='generateAI(${JSON.stringify(d)})'>AI</button></td>
   </tr>`;
 });
}

function generateAI(row){
 fetch("/api/ai",{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(row)
 })
 .then(r=>r.json())
 .then(res=>{
   document.getElementById("modalTitle").innerText = res.title;
   document.getElementById("modalText").innerText = res.text;
   document.getElementById("modal").style.display="flex";
 });
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}
</script>

</body>

</html>
