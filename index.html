<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-İçerik Tablosu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<style>
  :root{
    --bg:#0b1220;
    --text:#eaf0ff;
    --muted:#a9b6d6;
    --line:rgba(255,255,255,.10);
    --line2:rgba(255,255,255,.08);
    --accent:#4f8cff;
    --ok:#22c55e;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
    --radius:16px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% 0%, rgba(79,140,255,.25), transparent 60%),
      radial-gradient(900px 500px at 80% 10%, rgba(34,197,94,.18), transparent 55%),
      var(--bg);
    color:var(--text);
  }
  .wrap{ max-width:1200px; margin:28px auto; padding:0 16px 36px; }
  .header{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom:16px; }
  .title{ display:flex; flex-direction:column; gap:6px; }
  .title h1{ margin:0; font-size:28px; letter-spacing:.2px; }
  .title p{ margin:0; color:var(--muted); font-size:13px; }

  .badge{
    font-size:12px; padding:6px 10px; border-radius:999px;
    border:1px solid var(--line2); color:var(--muted);
    background:rgba(255,255,255,.04); white-space:nowrap;
  }

  .card{
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .controls{
    padding:14px;
    background:rgba(255,255,255,.03);
    border-bottom:1px solid var(--line);
    display:flex;
    flex-wrap:wrap;
    gap:10px 12px;
    align-items:center;
    justify-content:space-between;
  }
  .control-left{ display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center; }
  .control-right{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }

  .group{ display:flex; gap:8px; align-items:center; }
  label{ font-size:13px; color:var(--muted); font-weight:600; }

  select, input{
    appearance:none;
    background:rgba(255,255,255,.06);
    border:1px solid var(--line2);
    color:var(--text);
    padding:9px 10px;
    border-radius:12px;
    outline:none;
    font-size:13px;
    min-width:180px;
  }
  input{ min-width:260px; }
  select:disabled, input:disabled{ opacity:.6; }

  select{ color:#eaf0ff !important; }
  select option{ background:#0f1b32 !important; color:#ffffff !important; }

  .table-wrap{ width:100%; overflow:auto; }
  table{ width:100%; border-collapse:separate; border-spacing:0; min-width:980px; }
  thead th{
    position:sticky; top:0; z-index:2;
    background:rgba(15,27,50,.92);
    backdrop-filter: blur(8px);
    border-bottom:1px solid var(--line);
    text-align:left;
    padding:12px 12px;
    font-size:12px;
    color:var(--muted);
  }
  tbody td{
    padding:12px 12px;
    border-bottom:1px solid var(--line2);
    vertical-align:top;
    font-size:13px;
    word-break:break-word;
  }
  tbody tr:nth-child(2n){ background:rgba(255,255,255,.02); }
  tbody tr:hover{ background:rgba(79,140,255,.10); }

  .ai-btn{
    border:1px solid rgba(79,140,255,.45);
    background: linear-gradient(135deg, rgba(79,140,255,.95), rgba(79,140,255,.55));
    color:white;
    font-weight:700;
    padding:8px 10px;
    border-radius:12px;
    cursor:pointer;
    width:56px;
    box-shadow:0 8px 18px rgba(79,140,255,.22);
  }

  .btn{
    border:1px solid var(--line2);
    background:rgba(255,255,255,.06);
    color:var(--text);
    font-weight:700;
    padding:9px 12px;
    border-radius:12px;
    cursor:pointer;
  }
  .btn:hover{ background:rgba(255,255,255,.09); }
  .btn-primary{
    border-color: rgba(34,197,94,.45);
    background: linear-gradient(135deg, rgba(34,197,94,.95), rgba(34,197,94,.55));
    box-shadow:0 8px 18px rgba(34,197,94,.20);
  }
  .btn-accent{
    border-color: rgba(79,140,255,.45);
    background: linear-gradient(135deg, rgba(79,140,255,.95), rgba(79,140,255,.55));
    box-shadow:0 8px 18px rgba(79,140,255,.20);
  }

  .modal{
    position:fixed; inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:1050;
  }
  .panel{
    width:min(900px, 98vw);
    max-height:88vh;
    overflow:auto;
    border-radius:18px;
    border:1px solid var(--line);
    background: linear-gradient(180deg, rgba(15,27,50,.98), rgba(13,23,43,.98));
    box-shadow:var(--shadow);
  }
  .panel-head{ padding:14px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
  .panel-body{ padding:14px; }
  pre{ margin:0; white-space:pre-wrap; line-height:1.45; font-size:13px; font-family:inherit; }

  /* Geri Bildirim Butonu - Hover Özellikli */
  .feedback-btn {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: linear-gradient(135deg, #4f8cff, #3b5bdb);
    color: white;
    width: 52px;
    height: 52px;
    border-radius: 50px;
    border: none;
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    z-index: 999;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    white-space: nowrap;
  }
  .f-text { opacity: 0; width: 0; transition: opacity 0.2s; }
  .feedback-btn:hover { width: 190px; padding: 0 20px; justify-content: flex-start; }
  .feedback-btn:hover .f-text { opacity: 1; width: auto; margin-left: 10px; }

  #loadingOverlay{
    position:fixed; inset:0; background:rgba(10,20,40,0.75); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; z-index:9999;
  }
  .spinner{ width:48px; height:48px; border:4px solid rgba(255,255,255,.2); border-top:4px solid #4f8cff; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 15px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="title">
        <h1>E-İçerik Tablosu</h1>
        <p>Sınıf ve ders seç, tabloyu filtrele, AI ile senaryo dokümanı üret.</p>
      </div>
      <div class="badge" id="status">Veriler yükleniyor…</div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control-left">
          <div class="group"><label for="grade">Sınıf</label><select id="grade"><option value="">Yükleniyor…</option></select></div>
          <div class="group"><label for="course">Ders</label><select id="course" disabled><option value="">Önce sınıf seçiniz</option></select></div>
          <div class="group"><label for="q">Ara</label><input id="q" type="search" placeholder="Ara…" disabled /></div>
        </div>
        <div class="control-right">
          <button class="btn btn-accent" id="lastGenBtn" onclick="openLastScenario()">🕒 Son Senaryo</button>
          <button class="btn btn-primary" id="pdfBtn" onclick="downloadPDF()" disabled>📄 PDF indir</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>SIRA</th><th>ÜNİTE</th><th>KAZANIM</th><th>İÇERİK</th><th>AÇIKLAMA</th><th style="text-align:right;">AI</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" onclick="backdropClose(event)">
    <div class="panel">
      <div class="panel-head">
        <h3 id="modalTitle">AI Sonucu</h3>
        <button class="btn" onclick="closeModal()">Kapat</button>
      </div>
      <div class="panel-body"><pre id="modalText"></pre></div>
      <div class="panel-actions" style="padding:14px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;">
        <button class="btn btn-primary" onclick="copyModal()">Kopyala</button>
        <button class="btn" onclick="downloadWord()">Word indir</button>
        <button class="btn" onclick="clearScenarioHistory()">Geçmişi Sil</button>
        <button class="btn" onclick="closeModal()">Kapat</button>
      </div>
    </div>
  </div>

  <div id="loadingOverlay"><div style="text-align:center;"><div class="spinner"></div><div id="loadingText" style="color:white;">Hazırlanıyor...</div></div></div>

  <div class="modal" id="feedbackModal" onclick="feedbackBackdropClose(event)">
    <div class="panel" style="width:700px; height:80vh;">
      <div class="panel-head"><h3>Geri Bildirim</h3><button class="btn" onclick="closeFeedbackModal()">Kapat</button></div>
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScCQcqpkJNvyYIBcVwXCZzpZ6zy__r2y5JyQt-LtvPgEOH8Og/viewform?embedded=true" width="100%" height="100%" frameborder="0">Yükleniyor…</iframe>
    </div>
  </div>

  <button class="feedback-btn" onclick="openFeedbackModal()"><span>💬</span><span class="f-text">Görüş / Hata Bildir</span></button>

<script>
  let data = []; let filtered = []; let busyKey = "";
  const HISTORY_KEY = "icerik_tablo_scenario_history_v2";

  // --- History & Modal Logic ---
  function saveScenarioToHistory(payload) {
    let arr = [];
    try { arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); } catch {}
    arr = arr.filter(x => x.key !== payload.key);
    arr.unshift(payload);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, 50)));
  }

  function openLastScenario() {
    let arr = [];
    try { arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); } catch {}
    const last = arr[0];
    if (!last) { alert("Henüz bir senaryo üretilmemiş."); return; }
    
    window.__lastRowForWord = last.rowMeta || {};
    document.getElementById("modalTitle").innerText = last.title;
    document.getElementById("modalText").innerText = last.text;
    document.getElementById("modal").style.display = "flex";
  }

  function closeModal() { document.getElementById("modal").style.display = "none"; }
  function backdropClose(e) { if(e.target.id === "modal") closeModal(); }
  function copyModal() { navigator.clipboard.writeText(document.getElementById("modalText").innerText); alert("Kopyalandı!"); }
  
  function clearScenarioHistory() { 
    if(confirm("Tüm geçmiş silinsin mi?")) { 
      localStorage.removeItem(HISTORY_KEY); 
      closeModal(); 
    } 
  }

  function openFeedbackModal() { document.getElementById("feedbackModal").style.display = "flex"; }
  function closeFeedbackModal() { document.getElementById("feedbackModal").style.display = "none"; }
  function feedbackBackdropClose(e) { if(e.target.id === "feedbackModal") closeFeedbackModal(); }

  // --- CSV & Table Logic ---
  fetch("/content.csv").then(r => r.text()).then(text => {
    data = parseCSV(text, ";").filter(d => d["SINIF"]);
    document.getElementById("status").textContent = `Toplam: ${data.length} kayıt`;
    initFilters();
  });

  function parseCSV(text, delimiter) {
    const rows = text.split(/\r?\n/).map(r => r.split(delimiter));
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(cols => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = (cols[i] || "").trim());
      return obj;
    });
  }

  function initFilters() {
    const grades = [...new Set(data.map(d => d["SINIF"]))].sort((a,b)=>a-b);
    const gSel = document.getElementById("grade");
    gSel.innerHTML = '<option value="">Seçiniz</option>' + grades.map(g => `<option value="${g}">${g}</option>`).join("");
    
    gSel.onchange = () => {
      const cSel = document.getElementById("course");
      cSel.disabled = !gSel.value;
      const courses = [...new Set(data.filter(d => d["SINIF"] === gSel.value).map(d => d["DERS ADI"]))].sort();
      cSel.innerHTML = '<option value="">Seçiniz</option>' + courses.map(c => `<option value="${c}">${c}</option>`).join("");
    };

    document.getElementById("course").onchange = applyFilter;
    document.getElementById("q").oninput = applyFilter;
  }

  function applyFilter() {
    const g = document.getElementById("grade").value;
    const c = document.getElementById("course").value;
    const q = document.getElementById("q").value.toLowerCase();
    document.getElementById("q").disabled = !c;

    filtered = data.filter(d => d["SINIF"] === g && d["DERS ADI"] === c && (d["KAZANIM/ÖĞRENME ÇIKTISI/BÖLÜM"].toLowerCase().includes(q) || d["AÇIKLAMA"].toLowerCase().includes(q)));
    renderTable();
  }

  function renderTable() {
    const body = document.getElementById("tbody");
    body.innerHTML = "";
    filtered.forEach(d => {
      const tr = document.createElement("tr");
      const key = `${d["SINIF"]}-${d["SIRA NO"]}`;
      tr.innerHTML = `<td>${d["SIRA NO"]}</td><td>${d["ÜNİTE/TEMA/ ÖĞRENME ALANI"]}</td><td>${d["KAZANIM/ÖĞRENME ÇIKTISI/BÖLÜM"]}</td><td>${d["E-İÇERİK TÜRÜ"]}</td><td>${d["AÇIKLAMA"]}</td><td style="text-align:right;"><button class="ai-btn" onclick="handleAI('${key}')">AI</button></td>`;
      body.appendChild(tr);
    });
    document.getElementById("pdfBtn").disabled = filtered.length === 0;
  }

  async function handleAI(key) {
    const row = filtered.find(d => `${d["SINIF"]}-${d["SIRA NO"]}` === key);
    document.getElementById("loadingOverlay").style.display = "flex";
    
    try {
      const res = await fetch("/api/ai", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(row) }).then(r => r.json());
      saveScenarioToHistory({ key, title: res.title, text: res.text, rowMeta: row });
      openLastScenario();
    } catch(e) { alert("Hata oluştu."); }
    document.getElementById("loadingOverlay").style.display = "none";
  }

  function downloadWord() {
    const row = window.__lastRowForWord || {};
    const text = document.getElementById("modalText").innerText;
    const html = `<html><body><h2>${document.getElementById("modalTitle").innerText}</h2><p><b>Kazanım:</b> ${row["KAZANIM/ÖĞRENME ÇIKTISI/BÖLÜM"] || ""}</p><hr/><pre>${text}</pre></body></html>`;
    const blob = new Blob([html], {type:"application/msword"});
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Senaryo.doc"; a.click();
  }

  // --- PDF ---
  function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');
    doc.text("E-İçerik Planlama Tablosu", 14, 15);
    doc.autoTable({ head: [["SIRA", "ÜNİTE", "KAZANIM", "İÇERİK", "AÇIKLAMA"]], body: filtered.map(d => [d["SIRA NO"], d["ÜNİTE/TEMA/ ÖĞRENME ALANI"], d["KAZANIM/ÖĞRENME ÇIKTISI/BÖLÜM"], d["E-İÇERİK TÜRÜ"], d["AÇIKLAMA"]]), startY: 20 });
    doc.save("Tablo.pdf");
  }
</script>
</body>
</html>
